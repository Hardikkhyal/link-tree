name: hk_drop
description: "HK Drop - Effortless, offline, privacy-first cross-device sharing app for files and text."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking & mDNS Discovery
  bonsoir: ^2.1.1
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  dio: ^5.4.0
  http: ^1.2.0

  # Cryptography & Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  flutter_secure_storage: ^9.0.0

  # Platform Integrations
  receive_sharing_intent: ^1.4.5
  desktop_drop: ^0.4.4
  tray_manager: ^0.2.1
  window_manager: ^0.3.7
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0

  # Device & Network Metadata
  device_info_plus: ^10.1.0
  network_info_plus: ^5.0.3
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  file_picker: ^8.0.0
  uuid: ^4.3.3

  # UI, Icons, Animations & Pairing
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
