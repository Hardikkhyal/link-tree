pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(rootDir, 'local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { stream -> properties.load(stream) }
            def pathFromFile = properties.getProperty('flutter.sdk')
            if (pathFromFile != null) {
                return pathFromFile
            }
        }
        // Fallback to FLUTTER_ROOT environment variable (set by subosito/flutter-action in CI)
        def flutterRoot = System.getenv('FLUTTER_ROOT')
        assert flutterRoot != null, "Flutter SDK not found. Set flutter.sdk in local.properties or the FLUTTER_ROOT env variable."
        return flutterRoot
    }.call()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"
